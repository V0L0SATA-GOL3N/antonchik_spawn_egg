# Sets default memory used for gradle commands. Can be overridden by user or command line properties.
# This is required to provide enough memory for the Minecraft decompilation process.
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=false

# ForgeGradle for MC 1.12.2 runs on Gradle 5.6.4, which only works on Java 8.
# Without this, `./gradlew` fails under a newer default JDK (Groovy ReflectionCache error)
# and silently reuses stale build output -- which is what made the textures look "unfixable".
org.gradle.java.home=/Library/Java/JavaVirtualMachines/temurin-8.jdk/Contents/Home